services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchpoint
      POSTGRES_PASSWORD: watchpoint
      POSTGRES_DB: watchpoint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchpoint"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://watchpoint:watchpoint@postgres:5432/watchpoint
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      STORAGE_PATH: /app/storage
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
      - api-storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
  api-storage:
